name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "src/site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/site/package-lock.json

      - name: Install dependencies
        working-directory: src/site
        run: npm ci

      - name: Build React app
        working-directory: src/site
        run: npm run build

      - name: Prepare site directory
        run: |
          # Save tracked-in-git content that must survive the wipe
          if [ -f site/CNAME ]; then
            cp site/CNAME /tmp/CNAME
          fi
          if [ -f site/README.md ]; then
            cp site/README.md /tmp/README.md
          fi
          if [ -d site/experts ]; then
            cp -r site/experts /tmp/experts
          fi
          # Remove old site contents
          rm -rf site/*
          mkdir -p site
          # Copy build output to site
          cp -r src/site/dist/* site/
          # Restore preserved content
          if [ -f /tmp/CNAME ]; then
            cp /tmp/CNAME site/
          fi
          if [ -f /tmp/README.md ]; then
            cp /tmp/README.md site/
          fi
          # Merge preserved experts (.md source essays) into the built
          # experts/ dir (which holds SPA shells from generate-expert-shells).
          if [ -d /tmp/experts ]; then
            mkdir -p site/experts
            cp -r /tmp/experts/. site/experts/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
