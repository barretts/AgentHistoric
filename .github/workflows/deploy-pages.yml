name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "package.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - "index.html"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Prepare site directory
        run: |
          # Save CNAME and experts/ (tracked in git)
          if [ -f site/CNAME ]; then
            cp site/CNAME /tmp/CNAME
          fi
          if [ -d site/experts ]; then
            cp -r site/experts /tmp/experts
          fi
          # Remove old site contents
          rm -rf site/*
          mkdir -p site
          # Copy build output to site
          cp -r dist/* site/
          # Restore CNAME and experts/
          if [ -f /tmp/CNAME ]; then
            cp /tmp/CNAME site/
          fi
          if [ -d /tmp/experts ]; then
            cp -r /tmp/experts site/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
