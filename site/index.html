<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Historic</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f1221;
        color: #e8ebff;
        line-height: 1.5;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 3rem 1.25rem;
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
      }
      code {
        background: #1b2140;
        border: 1px solid #2e3766;
        border-radius: 6px;
        padding: 0.15rem 0.35rem;
      }
      pre {
        background: #1b2140;
        border: 1px solid #2e3766;
        border-radius: 8px;
        padding: 0.9rem;
        overflow-x: auto;
      }
      a {
        color: #9cc3ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Agent Historic</h1>
      <p>
        Install the latest remote bootstrap script:
      </p>
      <pre><code>bash &lt;(curl -fsSL https://agenthistoric.com/install.sh) --all</code></pre>
      <p>
        For local development, use <code>install-local.sh</code> from the repository root.
      </p>
      <p>
        Repository:
        <a href="https://github.com/barretts/AgentHistoric">github.com/barretts/AgentHistoric</a>
      </p>
    </main>
  </body>
</html>
